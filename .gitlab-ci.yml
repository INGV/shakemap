image: docker:19.03.6
#image: docker:latest

#services:
  # Remeber to set 'privileged = true' into the runner 'config.toml' file (es on hgp5: /srv/gitlab-runner/config/config.toml)
  #- docker:dind
#  - docker:19.03.1-dind

stages:
  - build-image
  - test
  - push-to-dockerhub

variables:
  # Use TLS https://docs.gitlab.com/ee/ci/docker/using_docker_build.html#tls-enabled
  #DOCKER_HOST: tcp://docker:2376
#  DOCKER_HOST: tcp://docker:2375
  #DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_CERTDIR: ""
  # https://gitlab.rm.ingv.it/help/user/project/pipelines/settings#git-strategy
  GIT_STRATEGY: clone
  
before_script:
  - export CI_JOB_DATE=$( date +%Y%m%d )
  - SHAKEMAP_CHECKOUT=$( grep "SHAKEMAP_CHECKOUT=" Dockerfile | awk -F"=" '{print $2}' )
  - export CONTAINER_TMP_IMAGE=${CI_PROJECT_NAME}:${CI_COMMIT_REF_SLUG}-sm4${SHAKEMAP_CHECKOUT}-our${CI_COMMIT_SHORT_SHA}
  - export CONTAINER_RELEASE_IMAGE_LATEST=${CI_PROJECT_NAME}:latest
  - export CONTAINER_RELEASE_IMAGE_SM4=${CI_PROJECT_NAME}:sm4${SHAKEMAP_CHECKOUT}
  - export DOCKERHUB_CONTAINER_RELEASE_IMAGE_LATEST=${DOCKERHUB_REGISTRY_USER}/${CONTAINER_RELEASE_IMAGE_LATEST}
  - export DOCKERHUB_CONTAINER_RELEASE_IMAGE_SM4=${DOCKERHUB_REGISTRY_USER}/${CONTAINER_RELEASE_IMAGE_SM4}
  - echo $SHAKEMAP_CHECKOUT
  - echo $CONTAINER_TMP_IMAGE 
  - echo $CONTAINER_RELEASE_IMAGE_LATEST
  - echo $CONTAINER_RELEASE_IMAGE_SM4
  - echo $DOCKERHUB_CONTAINER_RELEASE_IMAGE_LATEST
  - echo $DOCKERHUB_CONTAINER_RELEASE_IMAGE_SM4
  
build:
  stage: build-image
  tags:
    - sqlx2-srvr_runner
  script:
    - docker build --no-cache --pull --tag ${CONTAINER_TMP_IMAGE} .
    - docker images 
  only:
    - master
    
test:
  stage: test
  tags:
    - sqlx2-srvr_runner
  script:
    - docker images
    - docker run --rm --entrypoint=bash ${CONTAINER_TMP_IMAGE} -c ". /root/.bashrc && cd /opt/gitwork/shakemap_src && py.test ."
  only:
    - master

push:
  stage: push-to-dockerhub
  only:
    - master
  tags:
    - sqlx2-srvr_runner
  script:
    - echo ${DOCKERHUB_REGISTRY_PSW} | docker login -u ${DOCKERHUB_REGISTRY_USER} --password-stdin
    # Push tag latest
    - docker tag ${CONTAINER_TMP_IMAGE} ${DOCKERHUB_CONTAINER_RELEASE_IMAGE_LATEST}
    - docker push ${DOCKERHUB_CONTAINER_RELEASE_IMAGE_LATEST}
    # Push tag with SM4 commit
    - docker tag ${CONTAINER_TMP_IMAGE} ${DOCKERHUB_CONTAINER_RELEASE_IMAGE_SM4}
    - docker push ${DOCKERHUB_CONTAINER_RELEASE_IMAGE_SM4}
    # Remove images
    - docker image rm ${CONTAINER_TMP_IMAGE}
    - docker image rm ${DOCKERHUB_CONTAINER_RELEASE_IMAGE_LATEST}
    - docker image rm ${DOCKERHUB_CONTAINER_RELEASE_IMAGE_SM4}
    
