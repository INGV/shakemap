image: docker:19.03.6
#image: docker:latest

#services:
  # Remeber to set 'privileged = true' into the runner 'config.toml' file (es on hgp5: /srv/gitlab-runner/config/config.toml)
  #- docker:dind
#  - docker:19.03.1-dind

stages:
  - build_image
  - test
  - push-to-dockerhub

variables:
  # Use TLS https://docs.gitlab.com/ee/ci/docker/using_docker_build.html#tls-enabled
  #DOCKER_HOST: tcp://docker:2376
#  DOCKER_HOST: tcp://docker:2375
  #DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_CERTDIR: ""
  # https://gitlab.rm.ingv.it/help/user/project/pipelines/settings#git-strategy
  GIT_STRATEGY: clone
  
before_script:
  - export CI_JOB_DATE=$( date +%Y%m%d )
#  - export DOCKERHUB_CONTAINER_RELEASE_IMAGE="$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
  - export CONTAINER_TEST_IMAGE=${CI_PROJECT_NAME}:${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}
  - export DOCKERHUB_CONTAINER_TEST_IMAGE=${DOCKERHUB_REGISTRY_USER}/${CONTAINER_TEST_IMAGE}
  - export CONTAINER_RELEASE_IMAGE=${CI_PROJECT_NAME}:latest
  - export DOCKERHUB_CONTAINER_RELEASE_IMAGE=${DOCKERHUB_REGISTRY_USER}/${CONTAINER_RELEASE_IMAGE}
  - export CONTAINER_RELEASE_DATE_IMAGE="$CI_PROJECT_NAME:$CI_JOB_DATE"
  - echo $CONTAINER_TEST_IMAGE 
  - echo $DOCKERHUB_CONTAINER_TEST_IMAGE
  - echo $CONTAINER_RELEASE_IMAGE
  - echo $DOCKERHUB_CONTAINER_RELEASE_IMAGE
  - echo $CONTAINER_RELEASE_IMAGE
  - echo $CONTAINER_RELEASE_DATE_IMAGE
  - echo $CI_COMMIT_SHA
  
build:
  stage: build_image
  tags:
    - sqlx2-srvr_runner
  script:
    - docker build --no-cache --pull --tag ${CONTAINER_TEST_IMAGE} .
    - docker images 
  only:
    - master
    
test:
  stage: test
  tags:
    - sqlx2-srvr_runner
  script:
    - docker images
    - docker run --rm --entrypoint=bash ${CONTAINER_TEST_IMAGE} -c ". /root/.bashrc && cd /opt/gitwork/shakemap_src && py.test ."
  only:
    - master

push:
  stage: push-to-dockerhub
  only:
    - master
  tags:
    - sqlx2-srvr_runner
  script:
    - echo ${DOCKERHUB_REGISTRY_PSW} | docker login -u ${DOCKERHUB_REGISTRY_USER} --password-stdin
    - docker tag ${CONTAINER_TEST_IMAGE} ${DOCKERHUB_CONTAINER_RELEASE_IMAGE}
    - docker push ${DOCKERHUB_CONTAINER_RELEASE_IMAGE}
    - docker image rm ${CONTAINER_TEST_IMAGE}
    - docker image rm ${DOCKERHUB_CONTAINER_RELEASE_IMAGE}
    
