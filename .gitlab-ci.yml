image: docker:19.03.6
#image: docker:latest

services:
  # Remeber to set 'privileged = true' into the runner 'config.toml' file (es on hgp5: /srv/gitlab-runner/config/config.toml)
  #- docker:dind
  - docker:19.03.1-dind

stages:
  - build
  - release
  - clean

variables:
  # Use TLS https://docs.gitlab.com/ee/ci/docker/using_docker_build.html#tls-enabled
  #DOCKER_HOST: tcp://docker:2376
  DOCKER_HOST: tcp://docker:2375
  #DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_CERTDIR: ""
  # https://gitlab.rm.ingv.it/help/user/project/pipelines/settings#git-strategy
  GIT_STRATEGY: clone
  
before_script:
  - export CI_JOB_DATE=$( date +%Y%m%d )
#  - export DOCKERHUB_IMAGE="$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
  - export IMAGE_TMP=${CI_PROJECT_NAME}:$CI_COMMIT_REF_SLUG
  - export DOCKERHUB_IMAGE=${DOCKERHUB_REGISTRY_USER}/${CONTAINER_IMAGE_TMP}
  - export CONTAINER_RELEASE_IMAGE="$CI_PROJECT_NAME:latest"
  - export CONTAINER_RELEASE_DATE_IMAGE="$CI_PROJECT_NAME:$CI_JOB_DATE"
  - echo $IMAGE_TMP
  - echo $DOCKERHUB_REGISTRY_USER
  - echo $DOCKERHUB_REGISTRY_PSW
  - echo $CI_REGISTRY
#  - echo $DOCKERHUB_IMAGE
  - echo $CONTAINER_RELEASE_IMAGE
  - echo $CONTAINER_RELEASE_DATE_IMAGE
#  - docker login --username $CI_REGISTRY_USER --password $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - echo ${DOCKERHUB_REGISTRY_PSW} | docker login -u ${DOCKERHUB_REGISTRY_USER} --password-stdin
  
build:
  stage: build
  tags:
    - sqlx2-srvr_runner
  script:
    - DOCKER_BUILDKIT=1 docker build --no-cache --pull --tag ${IMAGE_TMP} .
    - docker push ${IMAGE_TMP}
  only:
    - master
    
release-image-latest:
  stage: release
  only:
    - master
  tags:
    - sqlx2-srvr_runner
  script:
#    - docker push $DOCKERHUB_IMAGE && docker image rm $DOCKERHUB_IMAGE
    - docker pull ${IMAGE_TMP}
    - docker tag ${IMAGE_TMP} ${DOCKERHUB_IMAGE}
#    - docker push $CONTAINER_RELEASE_IMAGE
    #- docker tag $DOCKERHUB_IMAGE $CONTAINER_RELEASE_DATE_IMAGE
    #- docker push $CONTAINER_RELEASE_DATE_IMAGE
    
